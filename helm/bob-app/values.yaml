replicaCount: 1

image:
  # Build from bob-app/Dockerfile and push to your registry
  # e.g.: docker build -t myregistry/bob-app:latest ./apps/bob-app && docker push myregistry/bob-app:latest
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

app:
  # Matches SERVICE_NAME env var read by server.js
  serviceName: "bob-app"
  port: 3001

service:
  # ClusterIP so Envoy routes to this pod internally
  # Change to NodePort or LoadBalancer to expose directly (bypasses JWT auth — demo only)
  type: ClusterIP
  port: 3001

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

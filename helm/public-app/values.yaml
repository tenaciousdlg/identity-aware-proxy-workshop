replicaCount: 1

image:
  repository: ghcr.io/tenaciousdlg/public-app
  tag: "latest"
  pullPolicy: IfNotPresent

app:
  # Matches SERVICE_NAME env var read by server.js
  serviceName: "public-app"
  port: 3000

service:
  # ClusterIP so Envoy routes to this pod internally
  # Change to NodePort or LoadBalancer to expose directly (bypasses JWT auth — demo only)
  type: ClusterIP
  port: 3000

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

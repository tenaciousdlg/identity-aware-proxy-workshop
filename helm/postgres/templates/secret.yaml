apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgres-jwt.fullname" . }}
  labels:
    {{- include "postgres-jwt.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.auth.superuserPassword | quote }}
  AUTHENTICATOR_PASSWORD: {{ .Values.auth.authenticatorPassword | quote }}
  # Proxy uses this to connect to the Postgres sidecar on localhost.
  # sslmode=disable because it's a localhost connection within the same pod.
  POSTGRES_URL: {{ printf "postgres://%s:%s@localhost:%d/%s?sslmode=disable" .Values.auth.authenticatorUser .Values.auth.authenticatorPassword (int .Values.postgres.port) .Values.postgres.database | quote }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "envoy.fullname" . }}
  labels:
    {{- include "envoy.labels" . | nindent 4 }}
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - name: main_listener
        address:
          socket_address:
            address: 0.0.0.0
            port_value: {{ .Values.listener.port }}
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              codec_type: AUTO
              route_config:
                name: local_route
                virtual_hosts:
                - name: backend
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/public"
                    route:
                      cluster: public_app_cluster
                      prefix_rewrite: "/"
                  - match:
                      prefix: "/alice"
                    route:
                      cluster: alice_app_cluster
                      prefix_rewrite: "/"
                  - match:
                      prefix: "/bob"
                    route:
                      cluster: bob_app_cluster
                      prefix_rewrite: "/"
                  - match:
                      prefix: "/health"
                    route:
                      cluster: public_app_cluster
                      prefix_rewrite: "/health"
              http_filters:
              - name: envoy.filters.http.jwt_authn
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                  providers:
                    keycloak:
                      issuer: {{ include "envoy.keycloakIssuer" . | quote }}
                      remote_jwks:
                        http_uri:
                          uri: {{ include "envoy.keycloakJwksUri" . | quote }}
                          cluster: keycloak_cluster
                          timeout: 5s
                        cache_duration:
                          seconds: 300
                      forward: true
                      forward_payload_header: "x-jwt-payload"
                      payload_in_metadata: "jwt_payload"
                      from_headers:
                      - name: "Authorization"
                        value_prefix: "Bearer "
                  rules:
                  - match:
                      prefix: "/health"
                  - match:
                      prefix: "/"
                    requires:
                      provider_name: "keycloak"

              - name: envoy.filters.http.rbac
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBAC
                  rules:
                    action: ALLOW
                    policies:
                      "allow-public":
                        permissions:
                        - or_rules:
                            rules:
                            - header:
                                name: ":path"
                                string_match:
                                  prefix: "/public"
                            - header:
                                name: ":path"
                                string_match:
                                  prefix: "/health"
                        principals:
                        - any: true

                      "allow-alice-only":
                        permissions:
                        - header:
                            name: ":path"
                            string_match:
                              prefix: "/alice"
                        principals:
                        - metadata:
                            filter: "envoy.filters.http.jwt_authn"
                            path:
                            - key: "jwt_payload"
                            - key: "preferred_username"
                            value:
                              string_match:
                                exact: "alice"

                      "allow-bob-only":
                        permissions:
                        - header:
                            name: ":path"
                            string_match:
                              prefix: "/bob"
                        principals:
                        - metadata:
                            filter: "envoy.filters.http.jwt_authn"
                            path:
                            - key: "jwt_payload"
                            - key: "preferred_username"
                            value:
                              string_match:
                                exact: "bob"

              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

              access_log:
              - name: envoy.access_loggers.stdout
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                  log_format:
                    json_format:
                      timestamp: "%START_TIME%"
                      method: "%REQ(:METHOD)%"
                      path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                      status: "%RESPONSE_CODE%"
                      duration_ms: "%DURATION%"
                      user: "%DYNAMIC_METADATA(envoy.filters.http.jwt_authn:jwt_payload:preferred_username)%"
                      roles: "%DYNAMIC_METADATA(envoy.filters.http.jwt_authn:jwt_payload:realm_access:roles)%"
                      response_flags: "%RESPONSE_FLAGS%"

      clusters:
      - name: keycloak_cluster
        connect_timeout: 5s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: keycloak_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: {{ .Values.keycloak.host }}
                    port_value: {{ .Values.keycloak.port }}

      - name: public_app_cluster
        connect_timeout: 5s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: public_app_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: {{ .Values.backends.publicApp.host }}
                    port_value: {{ .Values.backends.publicApp.port }}

      - name: alice_app_cluster
        connect_timeout: 5s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: alice_app_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: {{ .Values.backends.aliceApp.host }}
                    port_value: {{ .Values.backends.aliceApp.port }}

      - name: bob_app_cluster
        connect_timeout: 5s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: bob_app_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: {{ .Values.backends.bobApp.host }}
                    port_value: {{ .Values.backends.bobApp.port }}

    admin:
      access_log_path: /dev/null
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901

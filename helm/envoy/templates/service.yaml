apiVersion: v1
kind: Service
metadata:
  name: {{ include "envoy.fullname" . }}
  labels:
    {{- include "envoy.labels" . | nindent 4 }}
spec:
  {{- if .Values.nodePort.enabled }}
  type: NodePort
  {{- else }}
  type: {{ .Values.service.type }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if .Values.nodePort.enabled }}
      nodePort: {{ .Values.nodePort.port }}
      {{- end }}
  selector:
    {{- include "envoy.selectorLabels" . | nindent 4 }}

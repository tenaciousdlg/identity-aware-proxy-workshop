name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint: helm + go ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Helm lint
        run: |
          helm lint helm/public-app
          helm lint helm/alice-app
          helm lint helm/bob-app
          helm lint helm/envoy
          helm lint helm/postgres --set image.proxy.repository=test

      - uses: actions/setup-go@v5
        with:
          go-version-file: postgres-proxy/go.mod
          cache-dependency-path: postgres-proxy/go.sum

      - name: Go build and vet
        working-directory: postgres-proxy
        run: |
          go build ./...
          go vet ./...

  # ── E2E: kind cluster + smoke test ──────────────────────────────────────────
  e2e:
    name: E2E (kind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: helm/kind-action@v1
        with:
          cluster_name: workshop

      - uses: azure/setup-helm@v4

      - name: Build images
        run: |
          docker build -t public-app:latest    ./apps/public-app
          docker build -t alice-app:latest     ./apps/alice-app
          docker build -t bob-app:latest       ./apps/bob-app

      - name: Load images into kind
        run: |
          kind load docker-image public-app:latest  --name workshop
          kind load docker-image alice-app:latest   --name workshop
          kind load docker-image bob-app:latest     --name workshop

      - name: Deploy Keycloak
        run: |
          kubectl apply -f helm/keycloak/keycloak.yaml
          kubectl wait deployment/keycloak --for=condition=Available --timeout=120s

      - name: Deploy backend apps
        run: |
          helm install public-app helm/public-app \
            --set image.repository=public-app \
            --set image.tag=latest \
            --set image.pullPolicy=Never
          helm install alice-app helm/alice-app \
            --set image.repository=alice-app \
            --set image.tag=latest \
            --set image.pullPolicy=Never
          helm install bob-app helm/bob-app \
            --set image.repository=bob-app \
            --set image.tag=latest \
            --set image.pullPolicy=Never

      - name: Deploy Envoy
        run: |
          helm install envoy helm/envoy

      - name: Wait for deployments
        run: |
          kubectl wait deployment/public-app --for=condition=Available --timeout=60s
          kubectl wait deployment/alice-app  --for=condition=Available --timeout=60s
          kubectl wait deployment/bob-app    --for=condition=Available --timeout=60s
          kubectl wait deployment/envoy      --for=condition=Available --timeout=60s

      - name: Run smoke tests
        run: PORT_FORWARD=true bash scripts/smoke-test.sh

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -o wide
          echo "=== Keycloak logs ==="
          kubectl logs deployment/keycloak --tail=50 || true
          echo "=== Envoy logs ==="
          kubectl logs deployment/envoy --tail=50 || true
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp' | tail -30
